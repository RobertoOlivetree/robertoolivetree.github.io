role: Geographer and Spatial Data Scientist

bio: |
  Geographer and researcher working at the intersection of Geographic
  Information Science, spatial data science, urban and territorial analysis,
  and explainable artificial intelligence.

  My research explores how computational and spatial methods can strengthen
  spatial literacy, improve the interpretation of geographic phenomena,
  and support evidence-based territorial decision-making. I develop
  reproducible analytical workflows, building-level spatial analyses,
  interactive research tools, and explainable machine-learning applications.

